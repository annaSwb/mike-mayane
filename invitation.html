<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation | Mayane & Mikhael - Mairie</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --sage: #6B7F76;         /* Vert sauge */
            --pink: #E8A8B5;         /* Rose soutenu */
            --soft-white: #FDFBF7; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--soft-white); 
            color: var(--sage); 
            font-family: 'Montserrat', sans-serif; 
            background-image: radial-gradient(circle at center, #FBF6EE 0%, #EDE4D3 100%); 
            min-height: 100vh; 
            padding-bottom: 50px; 
        }
        .container { max-width: 650px; margin: 0 auto; padding: 20px; }
        
        .wedding-card { 
            background: rgba(245, 237, 224, 0.97); 
            border-radius: 15px; 
            padding: 25px; 
            border: 1px solid var(--pink); 
            box-shadow: 0 10px 25px rgba(232, 168, 181, 0.2); 
            text-align: center; 
            position: relative; 
            margin-top: 30px; 
        }
        
        .logo-inside { width: 140px; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto; }
        
        /* Photo réduite et ajustée pour un affichage "dézoomé" parfait */
        .mairie-img { 
            width: auto; 
            height: auto; 
            max-width: 80%; 
            max-height: 250px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            object-fit: contain; /* S'assure que l'image n'est pas rognée */
        }
        
        /* Boutons */
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 25px; }
        .btn-action { 
            flex: 1; max-width: 160px; padding: 12px 10px; 
            background: transparent; border: 2px solid var(--sage); 
            color: var(--sage); text-decoration: none; border-radius: 50px; 
            font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.3s; 
        }
        .btn-action:hover { background: var(--sage); color: white; }
        
        .btn-next { 
            display: block; width: 220px; margin: 30px auto; 
            background: linear-gradient(45deg, var(--sage), var(--pink)); 
            color: white; padding: 15px; border-radius: 50px; 
            text-decoration: none; font-weight: 700; text-align: center; 
            border: none; box-shadow: 0 4px 10px rgba(107, 127, 118, 0.3); 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="wedding-card">
            <img src="logo.png" alt="Mayane & Mikhael" class="logo-inside">
            
            <img src="mairie.png" alt="Mairie" class="mairie-img">
            
            <h3 style="font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; color: var(--sage); margin-bottom: 10px;">La Mairie</h3>
            <p><strong style="color: var(--pink);">Mercredi 8 Juillet 2026</strong></p>
            <p style="margin: 10px 0; font-size: 1.1rem; color: var(--sage);">Mairie de Saint-Brice-sous-Forêt</p>
            <p style="font-style: italic; font-size: 0.95rem; color: var(--sage);">
                Un Vin d'Honneur suivra la cérémonie au<br>
                <strong style="color: var(--pink);">3 rue Brieuse, Saint-Brice-sous-Forêt</strong><br>
                (le Beth Habad)
            </p>

            <div class="btn-group">
                <a href="https://www.waze.com/ul?q=Mairie+Saint-Brice-sous-Foret" target="_blank" class="btn-action">Waze</a>
                <button onclick="addToCalendar('mairie')" class="btn-action">Bloquer la date</button>
            </div>
        </div>
        <a href="invitation2.html" class="btn-next">La Houppa &raquo;</a>
    </div>

    <script>
        function addToCalendar(type) {
            const url = "https://www.google.com/calendar/render?action=TEMPLATE&text=Mariage+Mayane+%26+Mikhael+-+Mairie&dates=20260708T120000Z/20260708T140000Z&location=Mairie+de+Saint-Brice-sous-Foret";
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
