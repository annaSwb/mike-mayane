<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mayane & Mikhael | L'Union</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sage: #7A9085;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #fff;
            font-family: 'Montserrat', sans-serif;
            height: 100dvh; width: 100vw; 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            overflow: hidden;
        }

        .bg-image {
            width: 80%; /* Ajustez la taille selon votre préférence */
            max-width: 500px;
            height: auto;
            margin-bottom: 40px;
            /* Remplacer 'couple.png' par le nom de votre fichier image */
            background: url('couple.png') no-repeat center center / contain;
            aspect-ratio: 1/1; 
        }

        .enter-btn {
            display: inline-block; 
            padding: 18px 40px;
            /* Dégradé rose clair et or */
            background: linear-gradient(45deg, #FFB6C1, #FFD700); 
            color: white;
            text-decoration: none; 
            font-size: 0.9rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 2px;
            border-radius: 50px; 
            /* Ombre portée douce teintée de rose */
            box-shadow: 0 10px 25px rgba(255,182,193,0.5); 
            transition: transform 0.3s ease;
        }

        .enter-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <a href="invitation.html" class="enter-btn">Voir l'invitation</a>

</body>
</html>
